<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Salsa Duel — Phone Controller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(ellipse at 50% 30%, #3d1560 0%, #1a0a2e 70%);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    text-align: center;
    padding: 24px;
    overflow: hidden;
    touch-action: none;
  }
  h1 {
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(90deg, #ff4d2e, #ffd166);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .code { font-size: 1.1rem; opacity: 0.8; }
  .code b { color: #ffd166; letter-spacing: 0.3em; font-size: 1.4rem; }
  #status { font-size: 1.15rem; font-weight: 700; color: #2ec4b6; min-height: 1.4em; }
  #btn-enable {
    font-size: 1.4rem; font-weight: 800; color: #fff;
    padding: 20px 44px; border: none; border-radius: 50px; cursor: pointer;
    background: linear-gradient(135deg, #ff4d2e, #ff9f1c);
    box-shadow: 0 6px 26px rgba(255, 77, 46, 0.5);
  }
  #pulse {
    width: 170px; height: 170px; border-radius: 50%;
    background: radial-gradient(circle, #ff9f1c, #ff4d2e);
    box-shadow: 0 0 40px rgba(255, 159, 28, 0.6);
    display: none;
    align-items: center; justify-content: center;
    font-size: 3.4rem;
    transition: transform 0.08s;
  }
  #meter { width: 80%; max-width: 320px; height: 14px; border-radius: 8px; background: rgba(255,255,255,0.12); overflow: hidden; display: none; }
  #meter div { height: 100%; width: 0%; background: linear-gradient(90deg, #2ec4b6, #ffd166, #ff4d2e); transition: width 0.1s; }
  .hint { opacity: 0.7; max-width: 300px; line-height: 1.5; }
</style>
</head>
<body>
  <h1>SALSA DUEL 📱</h1>
  <p class="code">Controller code: <b id="code">----</b></p>
  <p id="status">Connecting…</p>
  <button id="btn-enable" hidden>🕺 Enable motion</button>
  <div id="pulse">💃</div>
  <div id="meter"><div id="meter-fill"></div></div>
  <p class="hint" id="hint">Keep this page open and hold the phone in your hand while you dance!</p>
  <script type="module" src="js/phone.js"></script>
</body>
</html>
